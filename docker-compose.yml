version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: travelnest-db
    environment:
      POSTGRES_DB: travelnest
      POSTGRES_USER: travelnest
      POSTGRES_PASSWORD: travelnest123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelnest"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travelnest-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travelnest-backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://travelnest:travelnest123@postgres:5432/travelnest?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: tn_jwt_secret_2024
      JWT_REFRESH_SECRET: tn_jwt_refresh_2024
      PRICE_FLUCTUATION_ENABLED: "true"
      SEED_ON_START: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: travelnest-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_WS_URL: http://localhost:5000
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    container_name: travelnest-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@travelnest.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
